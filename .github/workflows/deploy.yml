name: Deploy site

# Deploys the DialTone marketing site at dialtone.menu (Worker `dawn-pine-d058`).
# The entire repo is the site, so any push to `main` triggers a deploy.
# Also manually invokable via workflow_dispatch.
#
# Required GitHub Actions secrets:
#   CLOUDFLARE_API_TOKEN   — Workers edit permission on the dialtone.menu zone
#   CLOUDFLARE_ACCOUNT_ID  — Cloudflare account ID

on:
  push:
    branches: [main]

  workflow_dispatch:

jobs:
  deploy:
    name: Deploy site (dialtone.menu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Cloudflare and Supabase deploy config
        run: pnpm run validate:deploy

      - name: Verify required Worker secrets exist in Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          SECRETS_JSON=$(pnpm wrangler secret list --format json 2>/dev/null)
          # SUPABASE_SERVICE_ROLE_KEY or SUPABASE_KEY — at least one must exist
          HAS_SRK=$(echo "$SECRETS_JSON" | grep -c 'SUPABASE_SERVICE_ROLE_KEY' || true)
          HAS_KEY=$(echo "$SECRETS_JSON" | grep -c 'SUPABASE_KEY' || true)
          if [[ "$HAS_SRK" -eq 0 && "$HAS_KEY" -eq 0 ]]; then
            echo "ERROR: Neither SUPABASE_SERVICE_ROLE_KEY nor SUPABASE_KEY is set in Cloudflare."
            exit 1
          fi
          if ! echo "$SECRETS_JSON" | grep -q 'RESEND_API_KEY'; then
            echo "ERROR: RESEND_API_KEY is not set in Cloudflare."
            exit 1
          fi
          echo "All required secrets are present."

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm wrangler deploy

      # A green `wrangler deploy` is NOT proof the new code is live: a stale
      # worker once kept serving the marketing page on every branded menu host
      # for a day while every deploy showed green (2026-07-24). Verify by
      # CONTENT, not a 200. Hits a branded `.m.` host at /menu (renders the menu
      # regardless of site_mode) with a cache-buster so the edge misses and we
      # check the FRESH worker. `suis-sushi` is a stable tenant in the staging
      # DB the prod worker reads. Retries because a deploy takes ~10-30s to
      # propagate globally.
      - name: Verify branded menu host serves the menu (not stale/marketing)
        run: |
          URL="https://suis-sushi.m.dialtone.menu/menu?cb=$(date +%s%N)"
          for i in 1 2 3 4 5 6; do
            body=$(curl -fsS --max-time 15 "$URL" || true)
            if printf '%s' "$body" | grep -q 'Menu | DialTone'; then
              echo "✓ branded menu host is live (attempt $i)"; exit 0
            fi
            echo "attempt $i: not the menu yet (propagating), retrying in 10s…"
            sleep 10
          done
          echo "::error::Branded menu host is NOT serving the menu — deploy went green but stale code is live. See the 2026-07-24 stale-worker incident."
          exit 1
