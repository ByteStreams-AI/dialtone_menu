# DialTone — marketing site (dialtone.menu, www.dialtone.menu)
# Cloudflare Workers with Static Assets
# Docs: https://developers.cloudflare.com/workers/static-assets/
#
# Static multi-page site (index.html, privacy.html, terms.html). The
# live Worker that serves dialtone.menu was originally created via
# the Cloudflare dashboard's "Upload assets" flow (which generates
# the three-part random name). Keeping that exact name here so
# `wrangler deploy` updates the same Worker rather than creating a
# duplicate, and the existing custom domain bindings
# (`dialtone.menu`, `www.dialtone.menu`) stay intact.

name = "dawn-pine-d058"
main = "worker.js"
compatibility_date = "2026-04-20"
compatibility_flags = []

# Contact form destination. The Worker's `/api/contact` handler sends
# validated submissions via Resend's API; messages are delivered here.
# `hello@bytestreams.ai` is shared across the ByteStreams/DialTone
# brands as the single monitored inbox.
[vars]
CONTACT_EMAIL = "hello@bytestreams.ai"
# Identifies this site in the contact-form email From display name and
# subject prefix (e.g. `DialTone Contact: <submitter name>`), since
# both DialTone and ByteStreams share one sending domain on Resend
# (`send.bytestreams.ai`). Distinguishing by SITE_NAME keeps inbox
# sorting clean.
SITE_NAME = "DialToneMenu"

# Supabase configuration for form submission persistence.
# `/api/contact` is fail-fast for persistence: if SUPABASE_URL or DB key
# is missing, requests return `503` and do not send email.
SUPABASE_URL = "https://hltmzafywzqajjzjpqva.supabase.co"

# Public menu route (`/m/<slug>`) backend configuration:
# - Reads menu data from Supabase RPC `get_public_menu_by_slug` in the dialtone project.
# - PUBLIC_MENU_SUPABASE_ANON_KEY must be set as a Worker secret (never committed).
#   Run: npx wrangler secret put PUBLIC_MENU_SUPABASE_ANON_KEY
#
# Response behavior for `/m/<slug>`:
# - Friendly `404` page when the slug is unknown/inactive.
# - `503` when the target Supabase project is missing the RPC function
#   (`PGRST202` / function-not-found), indicating environment mismatch.
PUBLIC_MENU_SUPABASE_URL = "https://mxhyvvgjtqllohpvrwon.supabase.co"

# Optional durable rate limiting storage for /api/contact.
# If this binding is configured, `worker.js` will prefer KV-backed rate
# limiting and fall back to in-memory limits if KV is unavailable.
#
# Setup:
# 1) Create namespace: `npx wrangler kv namespace create RATE_LIMIT_KV`
# 2) Replace both placeholder IDs below with the returned IDs.
# 3) Deploy.
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "40a06e879d7b4cb3aa9752af39cf4de8"
preview_id = "be9cdfc34c7344d4966b2b6b55a02389"

# Required secret (not stored in this file): RESEND_API_KEY
# The `/api/contact` handler uses this to authenticate with Resend's
# API. Set it once per environment via:
#
#   npx wrangler secret put RESEND_API_KEY
#
# The value is encrypted at rest by Cloudflare and exposed to the
# Worker at runtime as `env.RESEND_API_KEY`. Never commit the raw key.
# If the secret is missing, `/api/contact` returns a user-friendly 503
# directing submitters to email `hello@bytestreams.ai` manually.

# Required secret (not stored in this file): SUPABASE_KEY
# The `/api/contact` handler uses this to insert waitlist submissions into
# Supabase. Set it via:
#
#   npx wrangler secret put SUPABASE_KEY
#
# Supabase table setup:
# 1. In Supabase console, create table `waitlist_submissions`:
#    CREATE TABLE public.waitlist_submissions (
#      id BIGINT PRIMARY KEY GENERATED ALWAYS AS IDENTITY,
#      email TEXT NOT NULL,
#      name TEXT NOT NULL,
#      restaurant_name TEXT NOT NULL,
#      campaign TEXT NOT NULL DEFAULT 'launch',
#      comment TEXT,
#      created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW()
#    );
# 2. Enable Row Level Security (RLS) and add policy allowing anonymous inserts
# 3. Get your SUPABASE_URL from Settings → API
# 4. Use an anon-key or service-role key as SUPABASE_KEY
# If SUPABASE_KEY/SUPABASE_SERVICE_ROLE_KEY is missing, `/api/contact`
# returns `503` and no email is sent.

# Assets live under `./public/` so wrangler's dev-server file watcher
# doesn't observe `.wrangler/` writes (which would cause a self-
# triggering reload loop). `public/.assetsignore` excludes the design/
# concept PNGs from being served publicly while still letting them
# live in the repo.
[assets]
directory = "./public/"
# `binding = "ASSETS"` exposes the assets collection to the Worker as
# `env.ASSETS`, which `worker.js` uses to proxy `/favicon.ico` to
# `/images/favicon.svg` and to resolve unmatched paths. Without this
# binding, `env.ASSETS` is undefined and those fallbacks 404 silently.
binding = "ASSETS"
# not_found_handling = "404-page" — this is a static multi-page site,
# not an SPA, so unknown paths should return the branded /404.html
# with a 404 status rather than rewriting to /index.html.
not_found_handling = "404-page"
# With `not_found_handling = "404-page"`, non-asset requests are
# short-circuited to `/404.html` without invoking the Worker. The
# Worker owns these dynamic paths (robots.txt, sitemap.xml, favicon
# fallback to /images/favicon.svg, security.txt, contact form), so
# force them to run through the Worker first instead of being
# treated as missing assets.
# `/` runs the Worker first so a branded menu subdomain (`<slug>.m.dialtone.menu`)
# serves the menu at its root instead of the marketing `index.html` asset. On
# the apex (`dialtone.menu`) the Worker falls through to the assets binding, so
# the homepage is unchanged. See the "Branded menu subdomains" runbook below.
run_worker_first = [
  "/",
  "/robots.txt",
  "/sitemap.xml",
  "/favicon.ico",
  "/.well-known/*",
  "/m/*",
  # `/menu` is the stable menu URL on a branded subdomain (#986 Phase 2). It
  # MUST be listed here: with `not_found_handling = "404-page"`, any path that
  # is neither an asset nor on this list is short-circuited to /404.html
  # WITHOUT invoking the Worker — so routing it inside worker.js alone left
  # `<slug>.m.dialtone.menu/menu` serving the marketing 404 page. Worker tests
  # cannot catch that: they call worker.fetch() directly, below the layer that
  # does the short-circuiting.
  "/menu",
  "/menu/",
  "/api/*"
]

# ── Branded menu hosts (`<slug>.m.dialtone.menu`) ───────────────────────────
# The Worker serves each restaurant's menu at its own host (the path form
# `dialtone.menu/m/<slug>` still works). `extractMenuSlugFromHost` in worker.js
# maps `<slug>.m.dialtone.menu` → that restaurant's menu.
#
# WHY `.m.` AND NOT `<slug>.dialtone.menu` — READ BEFORE "SIMPLIFYING" THIS.
# Serving slugs at the first level needs the route `*.dialtone.menu/*`, and that
# route matched EVERY app host: admin, kitchen, beverage, expo and their
# -staging variants all served the marketing site in production until it was
# deleted (dialtone#1011). The assumption it was added on — "Custom Domains
# out-rank a wildcard Route" — is false. Scoping one level deeper cannot overlap
# a single-label app host, which is why `*.pay.dialtone.menu` has always been
# safe. The alternative, a Custom Domain per restaurant, caps at 100 per zone
# and adds a provisioning step to every onboarding.
#
# There is no reserved-subdomain list any more: nothing but restaurants lives
# under `.m.`, so a restaurant legitimately called "The Kitchen" can have
# `kitchen.m.dialtone.menu`.
#
# Three one-time DASHBOARD steps (not managed by wrangler, so the existing
# `dialtone.menu` / `www` Custom Domains aren't disturbed):
#   1. TLS FIRST: `*.m.dialtone.menu` is a SECOND-level wildcard, which
#      Universal SSL does NOT cover — order an ACM/advanced certificate for it,
#      exactly as `*.pay.dialtone.menu` needed. Do this first; it takes minutes
#      to validate and without it every branded host fails the handshake.
#   2. DNS: add a PROXIED (orange-cloud) record `*.m` in the dialtone.menu zone
#      (AAAA `*.m` → `100::` proxied is the conventional placeholder).
#   3. Route: Workers & Pages → this Worker (`dawn-pine-d058`) → Triggers →
#      add Route `*.m.dialtone.menu/*` (zone dialtone.menu).
#
# VERIFY BY CONTENT, NOT STATUS CODE. The outage above passed a 200-only check:
# every app host returned 200 while serving the marketing homepage. Fetch each
# host and assert what came back, and include the -staging hosts:
#   for h in admin kitchen beverage expo admin-staging kitchen-staging \
#            beverage-staging; do
#     printf '%s -> ' "$h"
#     curl -s "https://$h.dialtone.menu/" | grep -o '<title>[^<]*' | head -1
#   done
# Then: `https://<any-live-slug>.m.dialtone.menu/` renders that menu, and an
# unprovisioned slug returns the friendly menu-not-found page.

# Declares the secret names required by this Worker.
# `wrangler deploy` and `wrangler dev` will warn if any are absent.
# These are *names only* — values are never stored here.
# Upload values with: bash developer/ci/deploy-prod-secrets.sh
[secrets]
required = [
  "RESEND_API_KEY",
  "SUPABASE_SERVICE_ROLE_KEY",
  "SUPABASE_KEY"
]

# Keep Worker observability settings in source control so dashboard and
# CI/CD deployments stay consistent.
[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = false
